<div class="min-h-screen bg-[#0d0e15] flex items-center justify-center p-4">
  
  <div class="w-full max-w-md bg-gradient-to-br from-[#131520] to-[#1a1d30] rounded-2xl p-8 shadow-2xl border border-purple-500/10 transition-all duration-300">
    
    <h1 class="text-3xl font-bold text-center mb-8 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent tracking-tight">
      Colección de Videojuegos
    </h1>

    <div class="flex flex-col gap-4 mb-8">
      <input 
        type="text" 
        [(ngModel)]="nuevoJuego['título']" 
        placeholder="Título del juego (ej: Hogwarts Legacy)" 
        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-400 outline-none focus:border-blue-400 transition-colors duration-200 text-sm"
      />
      <input 
        type="text" 
        [(ngModel)]="nuevoJuego['género']" 
        placeholder="Género (ej: RPG / Acción)" 
        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-slate-400 outline-none focus:border-blue-400 transition-colors duration-200 text-sm"
      />
      <button 
        (click)="agregarVideojuego()" 
        class="w-full bg-gradient-to-r from-blue-500 to-purple-600 hover:opacity-90 text-white font-semibold py-3 rounded-xl transition-all duration-200 text-sm shadow-lg shadow-purple-500/20 active:scale-[0.98]"
      >
        Añadir Juego
      </button>
    </div>

    <p *ngIf="listJuegos.length === 0" class="text-center text-slate-400 text-sm italic">
      No hay videojuegos registrados...
    </p>

    <ul *ngIf="listJuegos.length > 0" class="flex flex-col gap-3">
      <li 
        *ngFor="let juego of listJuegos" 
        class="group bg-white/[0.02] hover:bg-white/[0.05] border-l-4 border-blue-400 hover:border-purple-500 rounded-r-xl p-4 flex justify-between items-center transition-all duration-200 transform hover:translate-x-1"
      >
        <div class="flex flex-col gap-1">
          <strong class="text-white font-medium text-base tracking-wide">
            {{ getTitulo(juego) }}
          </strong>
          <div>
            <span class="text-xs bg-purple-500/10 text-purple-300 px-2.5 py-0.5 rounded-full font-medium uppercase tracking-wider">
              {{ getGenero(juego) }}
            </span>
          </div>
        </div>

        <button 
          (click)="eliminarVideojuego(juego['id'])" 
          class="text-slate-400 hover:text-red-400 hover:bg-red-500/10 p-2 rounded-lg transition-all duration-200 text-sm font-bold"
          title="Eliminar juego"
        >
          ✕
        </button>
      </li>
    </ul>

  </div>
</div>
